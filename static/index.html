<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❤️ Advanced Heart Failure & Stress Assessment Dashboard</title>
  
  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            display: ['Bricolage Grotesque', 'sans-serif'],
          },
          colors: {
            brand: {
              red: '#ff1744',
              cyan: '#00e5ff',
              purple: '#d500f9',
              darkBg: '#090a10',
              cardBg: 'rgba(17, 19, 31, 0.65)',
            }
          }
        }
      }
    }
  </script>

  <!-- React 18 & ReactDOM 18 UMD (Development Build for debugging) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel Standalone to transpile JSX on the fly in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    if (typeof Babel !== 'undefined') {
      Babel.registerPreset('classic-react', {
        presets: [
          [Babel.availablePresets['react'], { runtime: 'classic' }]
        ]
      });
    }
  </script>

  <!-- Custom CSS for React Bits effects -->
  <style>
    /* Global Styles */
    html, body {
      background-color: #06070d;
      color: #f8fafc;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* Ambient Aurora Backgrounds */
    .aurora-bg {
      position: fixed;
      width: 100vw;
      height: 100vh;
      top: 0;
      left: 0;
      z-index: -10;
      overflow: hidden;
      background: radial-gradient(circle at 100% 0%, #0c1020 0%, #06070d 70%);
    }

    .aurora-glow-1 {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 60%;
      height: 60%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 229, 255, 0.08) 0%, transparent 70%);
      filter: blur(80px);
      animation: floatGlow 15s infinite alternate ease-in-out;
    }

    .aurora-glow-2 {
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 60%;
      height: 60%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 23, 68, 0.08) 0%, transparent 70%);
      filter: blur(80px);
      animation: floatGlow 20s infinite alternate-reverse ease-in-out;
    }

    @keyframes floatGlow {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(8%, 8%) scale(1.15); }
    }

    /* Spotlight Card Effect (React Bits Spotlight Card) */
    .spotlight-card {
      position: relative;
      background: rgba(15, 17, 28, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      backdrop-filter: blur(16px);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
    }

    .spotlight-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(
        400px circle at var(--mouse-x, 0) var(--mouse-y, 0),
        rgba(0, 229, 255, 0.08),
        transparent 40%
      );
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .spotlight-card:hover::before {
      opacity: 1;
    }

    .spotlight-card-content {
      position: relative;
      z-index: 2;
    }

    /* Text Animations (Blur Text) */
    @keyframes blurIn {
      from {
        filter: blur(8px);
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        filter: blur(0);
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-blur-text {
      animation: blurIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Neon pulse for metrics */
    @keyframes neonPulse {
      0%, 100% {
        box-shadow: 0 0 10px rgba(0, 229, 255, 0.2), inset 0 0 5px rgba(0, 229, 255, 0.1);
        border-color: rgba(0, 229, 255, 0.3);
      }
      50% {
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.4), inset 0 0 10px rgba(0, 229, 255, 0.2);
        border-color: rgba(0, 229, 255, 0.6);
      }
    }

    .neon-pulse-cyan {
      animation: neonPulse 2s infinite ease-in-out;
    }

    @keyframes neonPulseRed {
      0%, 100% {
        box-shadow: 0 0 10px rgba(255, 23, 68, 0.2), inset 0 0 5px rgba(255, 23, 68, 0.1);
        border-color: rgba(255, 23, 68, 0.3);
      }
      50% {
        box-shadow: 0 0 20px rgba(255, 23, 68, 0.4), inset 0 0 10px rgba(255, 23, 68, 0.2);
        border-color: rgba(255, 23, 68, 0.6);
      }
    }

    .neon-pulse-red {
      animation: neonPulseRed 2s infinite ease-in-out;
    }

    /* Audio wave visualization bars */
    .wave-bar {
      width: 4px;
      height: 100%;
      background-color: #00e5ff;
      border-radius: 2px;
      animation: soundPulse 1.2s ease-in-out infinite alternate;
    }

    @keyframes soundPulse {
      0% { transform: scaleY(0.15); }
      100% { transform: scaleY(1.0); }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #06070d;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 229, 255, 0.3);
    }

    /* Print Styles */
    @media print {
      body, html {
        background: #ffffff !important;
        color: #000000 !important;
      }
      .no-print, nav, button, footer, #cursor-trail-canvas, .fixed {
        display: none !important;
      }
      .aurora-bg, .aurora-glow-1, .aurora-glow-2 {
        display: none !important;
      }
      .spotlight-card {
        background: #ffffff !important;
        border: 1px solid #e2e8f0 !important;
        color: #000000 !important;
        box-shadow: none !important;
        backdrop-filter: none !important;
        page-break-inside: avoid;
        margin-bottom: 1.5rem;
      }
      .text-slate-400, .text-slate-300, .text-slate-500, .text-slate-200 {
        color: #334155 !important;
      }
      .text-white {
        color: #000000 !important;
      }
      .bg-slate-900, .bg-slate-950, .bg-slate-900\/60, .bg-cyan-500\/5 {
        background: #f8fafc !important;
        border: 1px solid #e2e8f0 !important;
      }
      h1, h2, h3, h4 {
        color: #0f172a !important;
        background: none !important;
        -webkit-text-fill-color: initial !important;
      }
      .progress-bar-bg {
        background-color: #e2e8f0 !important;
      }
      .print-border {
        border: 1px solid #cbd5e1 !important;
      }
    }
  </style>
</head>
<body>
  <!-- Interactive Heartbeat Cursor Trail -->
  <canvas id="cursor-trail-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 999999;"></canvas>

  <!-- Ambient background elements -->
  <div class="aurora-bg">
    <div class="aurora-glow-1"></div>
    <div class="aurora-glow-2"></div>
  </div>

  <div id="root">
    <!-- Visual Loading Screen (Fallback if React doesn't mount) -->
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #06070d; font-family: 'Outfit', sans-serif;">
      <div style="text-align: center; padding: 2rem; max-width: 450px;">
        <div style="border: 4px solid rgba(0, 229, 255, 0.1); border-top: 4px solid #00e5ff; border-radius: 50%; width: 48px; height: 48px; margin: 0 auto 1.5rem auto; animation: spin 1s linear infinite;"></div>
        <h2 style="color: #ffffff; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem;">Initializing Dashboard...</h2>
        <p style="color: #94a3b8; font-size: 0.875rem; line-height: 1.5; margin-bottom: 0;">Please wait while the AI models and interface are mounted.</p>
      </div>
    </div>
  </div>
  
  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  <!-- Inline Babel React Code to prevent async loading/fetch races -->
  <script type="text/babel" data-presets="classic-react">
    const { useState, useEffect, useRef } = React;

    // --- Subcomponent: SpotlightCard (Inspired by React Bits) ---
    const SpotlightCard = ({ children, className = "", style = {} }) => {
      const cardRef = useRef(null);
      
      const handleMouseMove = (e) => {
        if (!cardRef.current) return;
        const rect = cardRef.current.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        cardRef.current.style.setProperty("--mouse-x", `${x}px`);
        cardRef.current.style.setProperty("--mouse-y", `${y}px`);
      };

      return (
        <div 
          ref={cardRef}
          onMouseMove={handleMouseMove}
          className={`spotlight-card p-6 flex flex-col ${className} antigravity-item`}
          style={style}
        >
          <div className="spotlight-card-content flex flex-col h-full">
            {children}
          </div>
        </div>
      );
    };

    // --- Subcomponent: Animated Heartbeat Waveform Visualizer ---
    const HeartVisualizer = ({ isActive, fileUploaded }) => {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let animationId;
        let width = canvas.width = canvas.offsetWidth;
        let height = canvas.height = canvas.offsetHeight;
        let phase = 0;
        
        const render = () => {
          ctx.clearRect(0, 0, width, height);
          
          // Draw background grid lines
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
          ctx.lineWidth = 1;
          for (let i = 0; i < width; i += 30) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, height);
            ctx.stroke();
          }
          for (let j = 0; j < height; j += 20) {
            ctx.beginPath();
            ctx.moveTo(0, j);
            ctx.lineTo(width, j);
            ctx.stroke();
          }

          // Draw active heartbeat line
          ctx.beginPath();
          ctx.strokeStyle = isActive ? '#00e5ff' : (fileUploaded ? '#d500f9' : '#ff1744');
          ctx.lineWidth = 3;
          ctx.shadowBlur = 10;
          ctx.shadowColor = isActive ? 'rgba(0, 229, 255, 0.5)' : (fileUploaded ? 'rgba(213, 0, 249, 0.3)' : 'rgba(255, 23, 68, 0.3)');
          
          for (let x = 0; x < width; x++) {
            let y = height / 2;
            
            if (isActive) {
              // ECG Waveform math
              let pos = (x + phase) % 180;
              if (pos > 50 && pos < 60) {
                // P wave
                y -= Math.sin((pos - 50) * Math.PI / 10) * 6;
              } else if (pos >= 60 && pos < 64) {
                // Q wave
                y += (pos - 60) * 3;
              } else if (pos >= 64 && pos < 70) {
                // R wave
                y -= (pos - 64) * 14 - 15;
              } else if (pos >= 70 && pos < 76) {
                // S wave
                y += (pos - 70) * 10 - 15;
              } else if (pos >= 76 && pos < 95) {
                // T wave
                y -= Math.sin((pos - 76) * Math.PI / 19) * 10;
              }
            } else if (fileUploaded) {
              y += Math.sin(x * 0.05 + phase * 0.1) * 3;
            } else {
              y += (Math.random() - 0.5) * 1.5;
            }
            
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
          
          phase = (phase - 4) % 1000;
          animationId = requestAnimationFrame(render);
        };
        
        render();
        
        const handleResize = () => {
          if (!canvas) return;
          width = canvas.width = canvas.offsetWidth;
          height = canvas.height = canvas.offsetHeight;
        };
        window.addEventListener('resize', handleResize);
        
        return () => {
          cancelAnimationFrame(animationId);
          window.removeEventListener('resize', handleResize);
        };
      }, [isActive, fileUploaded]);

      return (
        <div className="relative w-full">
          <canvas ref={canvasRef} className="w-full h-28 bg-slate-950/60 rounded-xl border border-white/5" />
          <div className="absolute top-2 right-3 text-[10px] uppercase font-bold tracking-wider text-white/40 flex items-center gap-1.5">
            <span className={`w-2 h-2 rounded-full ${isActive ? 'bg-cyan-400 animate-ping' : 'bg-brand-red'}`}></span>
            {isActive ? 'Simulating Live ECG' : (fileUploaded ? 'Audio Loaded' : 'No Signal')}
          </div>
        </div>
      );
    };

    // --- Main Application Component ---
    function App() {
      // Navigation State
      const [activeTab, setActiveTab] = useState("dashboard");

      // Sleep & Longevity State
      const [sleepAge, setSleepAge] = useState(30);
      const [sleepGender, setSleepGender] = useState("Male");
      const [sleepHeight, setSleepHeight] = useState(170);
      const [sleepWeight, setSleepWeight] = useState(70);
      const [yearsPoorSleep, setYearsPoorSleep] = useState(0);
      const [bedtime, setBedtime] = useState("22:30");
      const [wakeupTime, setWakeupTime] = useState("06:30");
      const [sleepDuration, setSleepDuration] = useState(8);
      const [sleepQual, setSleepQual] = useState("Good");
      const [exerciseFreq, setExerciseFreq] = useState(3);
      const [smoking, setSmoking] = useState("Non-smoker");
      const [alcohol, setAlcohol] = useState("None");
      const [workSchedule, setWorkSchedule] = useState("Day Shift");
      const [screenTime, setScreenTime] = useState(4);
      const [sleepStress, setSleepStress] = useState(4);
      const [existingConditions, setExistingConditions] = useState("");
      const [famHeart, setFamHeart] = useState(false);
      const [famDiabetes, setFamDiabetes] = useState(false);
      const [famHypertension, setFamHypertension] = useState(false);

      const [sleepLoading, setSleepLoading] = useState(false);
      const [sleepResult, setSleepResult] = useState(null);

      // Heart Risk State
      const [age, setAge] = useState(30);
      const [heartFile, setHeartFile] = useState(null);
      const [audioUrl, setAudioUrl] = useState("");
      const [isAudioPlaying, setIsAudioPlaying] = useState(false);
      const [heartLoading, setHeartLoading] = useState(false);
      const [heartResult, setHeartResult] = useState(null);

      // Stress State
      const [anxietyLevel, setAnxietyLevel] = useState(13);
      const [mentalHealthHistory, setMentalHealthHistory] = useState(0);
      const [depression, setDepression] = useState(10);
      const [headache, setHeadache] = useState(1);
      const [sleepQuality, setSleepQuality] = useState(5);
      const [breathingProblem, setBreathingProblem] = useState(2);
      const [livingConditions, setLivingConditions] = useState(2);
      const [stressLoading, setStressLoading] = useState(false);
      const [stressResult, setStressResult] = useState({ stress_class: 0, stress_level: "Low" });

      // Antigravity Easter Egg State
      const [antigravity, setAntigravity] = useState(false);
      const physicsElements = useRef([]);
      const mousePos = useRef({ x: 0, y: 0, px: 0, py: 0, vx: 0, vy: 0, down: false });

      // Auto-predict stress on inputs change
      useEffect(() => {
        const predictStress = async () => {
          setStressLoading(true);
          try {
            const res = await fetch("/api/predict/stress", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                anxiety_level: Number(anxietyLevel),
                mental_health_history: Number(mentalHealthHistory),
                depression: Number(depression),
                headache: Number(headache),
                sleep_quality: Number(sleepQuality),
                breathing_problem: Number(breathingProblem),
                living_conditions: Number(livingConditions)
              })
            });
            if (res.ok) {
              const data = await res.json();
              setStressResult(data);
            }
          } catch (err) {
            console.error("Stress prediction error:", err);
          } finally {
            setStressLoading(false);
          }
        };
        
        const delayDebounceFn = setTimeout(() => {
          predictStress();
        }, 400);

        return () => clearTimeout(delayDebounceFn);
      }, [anxietyLevel, mentalHealthHistory, depression, headache, sleepQuality, breathingProblem, livingConditions]);

      // Audio Playback Watcher
      const audioRef = useRef(null);
      const handlePlayToggle = () => {
        if (!audioRef.current) return;
        if (isAudioPlaying) {
          audioRef.current.pause();
          setIsAudioPlaying(false);
        } else {
          audioRef.current.play();
          setIsAudioPlaying(true);
        }
      };

      const handleAudioEnded = () => {
        setIsAudioPlaying(false);
      };

      // Heartbeat File Upload & Analyze
      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          setHeartFile(file);
          setAudioUrl(URL.createObjectURL(file));
          setHeartResult(null);
        }
      };

      const analyzeHeartbeat = async () => {
        if (!heartFile) return;
        setHeartLoading(true);
        const formData = new FormData();
        formData.append("file", heartFile);
        formData.append("age", age);

        try {
          const res = await fetch("/api/predict/heart", {
            method: "POST",
            body: formData
          });
          if (res.ok) {
            const data = await res.json();
            setHeartResult(data);
          } else {
            alert("Failed to analyze heart sound.");
          }
        } catch (err) {
          console.error(err);
          alert("Error contacting API.");
        } finally {
          setHeartLoading(false);
        }
      };

      // Antigravity Engine Loop
      useEffect(() => {
        let animId;

        const handleMouseMove = (e) => {
          mousePos.current.x = e.clientX;
          mousePos.current.y = e.clientY;
          mousePos.current.vx = mousePos.current.x - mousePos.current.px;
          mousePos.current.vy = mousePos.current.y - mousePos.current.py;
          mousePos.current.px = mousePos.current.x;
          mousePos.current.py = mousePos.current.y;
        };

        window.addEventListener('mousemove', handleMouseMove);

        const updatePhysics = () => {
          if (antigravity) {
            physicsElements.current.forEach(item => {
              // Gravity pull upward (floating)
              item.vy -= 0.05;
              // Brownian motion
              item.vx += (Math.random() - 0.5) * 0.3;
              item.vy += (Math.random() - 0.5) * 0.3;
              // Friction
              item.vx *= 0.98;
              item.vy *= 0.98;

              // Mouse repulsion
              const rect = item.dom.getBoundingClientRect();
              const cx = rect.left + rect.width / 2;
              const cy = rect.top + rect.height / 2;
              const dx = cx - mousePos.current.x;
              const dy = cy - mousePos.current.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              
              if (dist < 220 && dist > 1) {
                const force = (220 - dist) * 0.15;
                item.vx += (dx / dist) * force;
                item.vy += (dy / dist) * force;
              }

              item.dx += item.vx;
              item.dy += item.vy;

              // Wall collision
              const buffer = 20;
              if (rect.left + item.vx < buffer) {
                item.vx = Math.abs(item.vx) * 0.8;
                item.dx += item.vx;
              }
              if (rect.right + item.vx > window.innerWidth - buffer) {
                item.vx = -Math.abs(item.vx) * 0.8;
                item.dx += item.vx;
              }
              if (rect.top + item.vy < buffer) {
                item.vy = Math.abs(item.vy) * 0.8;
                item.dy += item.vy;
              }
              if (rect.bottom + item.vy > window.innerHeight - buffer) {
                item.vy = -Math.abs(item.vy) * 0.8;
                item.dy += item.vy;
              }

              item.dom.style.transform = `translate3d(${item.dx}px, ${item.dy}px, 0px)`;
            });
          }
          animId = requestAnimationFrame(updatePhysics);
        };

        if (antigravity) {
          // Initialize physics items
          const domElements = document.querySelectorAll('.antigravity-item');
          physicsElements.current = Array.from(domElements).map(el => {
            el.style.willChange = 'transform';
            el.style.transition = 'none';
            return {
              dom: el,
              dx: 0,
              dy: 0,
              vx: (Math.random() - 0.5) * 5,
              vy: (Math.random() - 0.5) * 5 - 2,
              width: el.offsetWidth,
              height: el.offsetHeight
            };
          });
          animId = requestAnimationFrame(updatePhysics);
        } else {
          // Reset physics styles
          physicsElements.current.forEach(item => {
            item.dom.style.transform = '';
            item.dom.style.willChange = '';
            item.dom.style.transition = '';
          });
          physicsElements.current = [];
          cancelAnimationFrame(animId);
        }

        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
          cancelAnimationFrame(animId);
        };
      }, [antigravity]);

      // Combined Recommendation Logic
      const getCombinedRecommendation = () => {
        let risk = heartResult ? heartResult.heart_failure_risk : 0;
        let stress = stressResult ? stressResult.stress_class : 0;
        let sleep = sleepResult ? sleepResult.sleep_health_score : 100;
        let longevity = sleepResult ? sleepResult.longevity_wellness_score : 100;

        let status = "success";
        let title = "🟢 Health Metrics Stable";
        let descriptions = [];

        if (heartResult) {
          if (risk >= 70) {
            status = "critical";
            descriptions.push(`Critical cardiac risk index: ${risk.toFixed(1)}%. Seek immediate medical attention.`);
          } else if (risk >= 40) {
            if (status !== "critical") status = "warning";
            descriptions.push(`Elevated cardiac risk index: ${risk.toFixed(1)}%. Consult a cardiologist.`);
          } else if (risk >= 20) {
            if (status !== "critical" && status !== "warning") status = "info";
            descriptions.push(`Mild murmur/acoustic anomalies detected (Risk: ${risk.toFixed(1)}%).`);
          }
        } else {
          descriptions.push("No cardiac acoustics uploaded. Complete the Heart Failure Assessment module.");
        }

        if (stress === 2) {
          if (status !== "critical") status = "warning";
          descriptions.push("High stress levels detected via lifestyle inputs. Prioritize relaxation and autonomic recovery.");
        } else if (stress === 1) {
          if (status === "success") status = "info";
          descriptions.push("Moderate stress indicators detected.");
        }

        if (sleepResult) {
          if (sleepResult.biological_risk_level === "Critical" || sleepResult.biological_risk_level === "High") {
            status = "critical";
            descriptions.push(`Sleep & Longevity assessment flags a ${sleepResult.biological_risk_level} biological risk. Sleep health score: ${sleep}/100.`);
          } else if (sleepResult.biological_risk_level === "Moderate") {
            if (status !== "critical") status = "warning";
            descriptions.push(`Moderate biological risk flags. Optimize sleep habits (Score: ${sleep}/100) to protect longevity (Score: ${longevity}/100).`);
          }
        }

        if (status === "critical") {
          title = "⚠️ High Alert: Critical Health Risks Detected";
        } else if (status === "warning") {
          title = "🟡 Elevated Health Warning: Action Recommended";
        } else if (status === "info") {

  <!-- High-Performance Heartbeat & ECG Cursor Trail Engine -->
  <script>
    (function() {
      const canvas = document.getElementById('cursor-trail-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      
      let width = canvas.width = window.innerWidth;
      let height = canvas.height = window.innerHeight;
      
      window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });
      
      const hearts = [];
      let lastSpawn = 0;
      
      window.addEventListener('mousemove', (e) => {
        const now = Date.now();
        // Generate a heart every 250ms (prevents excessive elements)
        if (now - lastSpawn > 250) {
          lastSpawn = now;
          hearts.push({
            x: e.clientX,
            y: e.clientY,
            size: 14, // starting size matching tutorial aspect ratio
            age: 0,
            maxAge: 72 // 1.2s at 60fps
          });
        }
      });
      
      function drawHeart(ctx, x, y, size) {
        ctx.beginPath();
        ctx.moveTo(x, y + size / 4);
        ctx.quadraticCurveTo(x, y - size / 2, x - size / 2, y - size / 2);
        ctx.quadraticCurveTo(x - size, y - size / 2, x - size, y + size / 4);
        ctx.quadraticCurveTo(x - size, y + size * 0.75, x, y + size * 1.2);
        ctx.quadraticCurveTo(x + size, y + size * 0.75, x + size, y + size / 4);
        ctx.quadraticCurveTo(x + size, y - size / 2, x + size / 2, y - size / 2);
        ctx.quadraticCurveTo(x, y - size / 2, x, y + size / 4);
        ctx.closePath();
        ctx.fill();
      }
      
      function tick() {
        ctx.clearRect(0, 0, width, height);
        
        ctx.shadowBlur = 8;
        ctx.shadowColor = 'rgba(226, 85, 85, 0.4)';
        ctx.fillStyle = '#e25555'; // Exact heart color from Divi tutorial
        
        for (let i = hearts.length - 1; i >= 0; i--) {
          const h = hearts[i];
          h.age++;
          
          if (h.age >= h.maxAge) {
            hearts.splice(i, 1);
            continue;
          }
          
          const progress = h.age / h.maxAge;
          
          // Translate heart upwards: y offsets from 0 to -100px (equivalent to translate(-50%, -200%))
          const floatY = progress * -100;
          // Scale from 1.0 to 1.4
          const scale = 1.0 + progress * 0.4;
          // Fade out opacity from 1.0 to 0.0
          const alpha = 1.0 - progress;
          
          ctx.save();
          ctx.globalAlpha = alpha;
          
          const currentSize = h.size * scale;
          // Draw the heart translated upwards and centered horizontally
          drawHeart(ctx, h.x, h.y + floatY, currentSize);
          
          ctx.restore();
        }
        
        requestAnimationFrame(tick);
      }
      
      tick();
    })();
  </script>
